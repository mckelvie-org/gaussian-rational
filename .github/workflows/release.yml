name: Release

# Single entry point for all version management and release branching.
#
# Three actions:
#
#   bump-dev  — increment the dev version on main (no publish).
#               Runs on: main
#
#   cut-rc    — create (or reset) an rc/<x.y.z> branch from main's current
#               X.Y.Z with version X.Y.Z-rc.N.  The branch push triggers
#               publish-test.yml.
#               Runs on: main
#
#   cut-prod  — promote the current rc/* branch to a prod/<x.y.z> branch with
#               the clean X.Y.Z version.  The branch push triggers publish.yml
#               (which tags the commit and auto-bumps main after a successful
#               PyPI push).
#               Runs on: rc/<x.y.z>
#
# Version invariants enforced here:
#   - main always carries X.Y.Z-dev.N
#   - rc branches always carry X.Y.Z-rc.N  (same X.Y.Z as their main parent)
#   - prod branches always carry X.Y.Z      (same X.Y.Z as their rc parent)

on:
  workflow_dispatch:
    inputs:
      action:
        description: >
          bump-dev: update dev version on main |
          cut-rc: create RC from main's current version |
          cut-prod: promote current rc/* branch to production
        required: true
        type: choice
        options:
          - bump-dev
          - cut-rc
          - cut-prod
        default: bump-dev
      bump_type:
        description: >
          For bump-dev — dev: increment counter (1.0.0-dev.1 → 1.0.0-dev.2);
          patch/minor/major: bump x.y.z and reset to dev.1
        required: false
        type: choice
        options:
          - dev
          - patch
          - minor
          - major
        default: minor

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.12"
          cache: true

      - name: Install dependencies
        run: pdm install -G dev

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Quality gate — skipped for bump-dev since no code changes.
      - name: Run quality checks
        if: ${{ github.event.inputs.action != 'bump-dev' }}
        run: |
          pdm run lint
          pdm run typecheck
          pdm run test

      # Validate branch, parse current version, compute new version and release
      # metadata, then write all outputs for the steps that follow.
      - name: Compute release parameters
        id: params
        env:
          ACTION: ${{ github.event.inputs.action }}
          BUMP_TYPE: ${{ github.event.inputs.bump_type }}
          BRANCH: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os, re, subprocess, sys, tomllib

          action    = os.environ["ACTION"]
          bump_type = os.environ.get("BUMP_TYPE", "minor")
          branch    = os.environ["BRANCH"]

          DEV_RE = re.compile(r'^(\d+)\.(\d+)\.(\d+)-dev\.(\d+)$')
          RC_RE  = re.compile(r'^(\d+)\.(\d+)\.(\d+)-rc\.(\d+)$')

          with open("pyproject.toml", "rb") as f:
              current = tomllib.load(f)["project"]["version"]

          def out(key, value):
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"{key}={value}\n")

          def fail(msg):
              print(f"::error::{msg}", file=sys.stderr)
              sys.exit(1)

          if action == "bump-dev":
              if branch != "main":
                  fail(f"bump-dev must run on main, got branch: {branch!r}")
              m = DEV_RE.match(current)
              if not m:
                  fail(f"Expected X.Y.Z-dev.N on main, got: {current!r}")
              x, y, z, n = (int(m.group(i)) for i in range(1, 5))
              if   bump_type == "dev":   new = f"{x}.{y}.{z}-dev.{n + 1}"
              elif bump_type == "patch": new = f"{x}.{y}.{z + 1}-dev.1"
              elif bump_type == "minor": new = f"{x}.{y + 1}.0-dev.1"
              elif bump_type == "major": new = f"{x + 1}.0.0-dev.1"
              else: fail(f"Unknown bump_type: {bump_type!r}")
              out("new_version", new)
              out("release_branch", "main")
              out("tag", "")

          elif action == "cut-rc":
              if branch != "main":
                  fail(f"cut-rc must run on main, got branch: {branch!r}")
              m = DEV_RE.match(current)
              if not m:
                  fail(f"Expected X.Y.Z-dev.N on main, got: {current!r}")
              x, y, z = int(m.group(1)), int(m.group(2)), int(m.group(3))
              xyz = f"{x}.{y}.{z}"
              # Determine next rc counter from existing tags for this x.y.z.
              tags = subprocess.check_output(
                  ["git", "tag", "--list", f"rc-v{xyz}-rc.*"]
              ).decode().split()
              ns = [int(re.search(r"rc\.(\d+)$", t).group(1))
                    for t in tags if re.search(r"rc\.(\d+)$", t)]
              n = max(ns) + 1 if ns else 1
              new = f"{xyz}-rc.{n}"
              out("new_version", new)
              out("release_branch", f"rc/{xyz}")

          elif action == "cut-prod":
              if not branch.startswith("rc/"):
                  fail(f"cut-prod must run on an rc/* branch, got: {branch!r}")
              m = RC_RE.match(current)
              if not m:
                  fail(f"Expected X.Y.Z-rc.N on rc branch, got: {current!r}")
              x, y, z = int(m.group(1)), int(m.group(2)), int(m.group(3))
              new = f"{x}.{y}.{z}"
              out("new_version", new)
              out("release_branch", f"prod/{x}.{y}.{z}")

          else:
              fail(f"Unknown action: {action!r}")
          PY

      - name: Update version in pyproject.toml
        env:
          NEW_VERSION: ${{ steps.params.outputs.new_version }}
        run: |
          python - <<'PY'
          import os, re
          v = os.environ["NEW_VERSION"]
          with open("pyproject.toml") as f:
              text = f.read()
          updated = re.sub(
              r'^(version\s*=\s*")[^"]*(")',
              rf'\g<1>{v}\2',
              text,
              flags=re.MULTILINE,
          )
          assert updated != text, "version= line not found in pyproject.toml"
          with open("pyproject.toml", "w") as f:
              f.write(updated)
          print(f"Set version to {v}")
          PY

      # bump-dev: commit and push directly to main.
      - name: Commit and push to main
        if: ${{ github.event.inputs.action == 'bump-dev' }}
        env:
          NEW_VERSION: ${{ steps.params.outputs.new_version }}
        run: |
          git add pyproject.toml
          git commit -m "chore: bump version to ${NEW_VERSION}"
          git push origin main

      # cut-rc / cut-prod: create the release branch, commit, and push.
      # The pushed branch triggers publish-test.yml (rc/**) or publish.yml (prod/**).
      - name: Create release branch, commit and push
        if: ${{ github.event.inputs.action == 'cut-rc' || github.event.inputs.action == 'cut-prod' }}
        env:
          NEW_VERSION: ${{ steps.params.outputs.new_version }}
          RELEASE_BRANCH: ${{ steps.params.outputs.release_branch }}
        run: |
          git checkout -B "$RELEASE_BRANCH"
          git add pyproject.toml
          git commit -m "chore: release ${NEW_VERSION}"
          git push origin "$RELEASE_BRANCH"
