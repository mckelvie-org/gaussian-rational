name: Release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        type: choice
        options:
          - dev
          - rc
          - prod
        default: dev
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: minor
      prerelease_token:
        description: "Prerelease token for dev/rc channel (must match channel on main)"
        required: false
        type: string
        default: dev

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.12"
          cache: true

      - name: Install dependencies
        run: pdm install -G dev

      - name: Run checks
        run: |
          pdm run lint
          pdm run typecheck
          pdm run test

      - name: Enforce main branch version policy
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          CHANNEL: ${{ github.event.inputs.channel }}
          PRERELEASE_TOKEN: ${{ github.event.inputs.prerelease_token }}
        run: |
          if [[ "$BRANCH_NAME" == "main" ]]; then
            if [[ "$CHANNEL" != "dev" ]]; then
              echo "main branch can only create dev-channel releases"
              exit 1
            fi
            if [[ "$PRERELEASE_TOKEN" != "dev" ]]; then
              echo "main branch requires prerelease_token=dev"
              exit 1
            fi
          fi

          if [[ "$CHANNEL" == "rc" && "$PRERELEASE_TOKEN" != "rc" ]]; then
            echo "rc channel requires prerelease_token=rc"
            exit 1
          fi

      - name: Bump version
        env:
          CHANNEL: ${{ github.event.inputs.channel }}
          BUMP: ${{ github.event.inputs.bump }}
          PRERELEASE_TOKEN: ${{ github.event.inputs.prerelease_token }}
        run: |
          BUMP_FLAG="--$BUMP"

          if [[ "$CHANNEL" == "dev" || "$CHANNEL" == "rc" ]]; then
            python -m semantic_release version \
              "$BUMP_FLAG" \
              --as-prerelease \
              --prerelease-token "$PRERELEASE_TOKEN" \
              --skip-build \
              --no-vcs-release \
              --no-push \
              --no-tag
          elif [[ "$CHANNEL" == "prod" ]]; then
            python -m semantic_release version \
              "$BUMP_FLAG" \
              --skip-build \
              --no-vcs-release \
              --no-push \
              --no-tag
          else
            echo "Unsupported channel: $CHANNEL"
            exit 1
          fi

      - name: Create channel tag
        env:
          CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          VERSION=$(python - <<'PY'
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
          print(data['project']['version'])
          PY
          )

          if [[ "$CHANNEL" == "dev" ]]; then
            TAG_NAME="dev-v$VERSION"
          elif [[ "$CHANNEL" == "rc" ]]; then
            TAG_NAME="rc-v$VERSION"
          elif [[ "$CHANNEL" == "prod" ]]; then
            TAG_NAME="v$VERSION"
          else
            echo "Unsupported channel: $CHANNEL"
            exit 1
          fi

          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"

          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag already exists locally: $TAG_NAME"
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag already exists on origin: $TAG_NAME"
            exit 1
          fi

          git tag "$TAG_NAME"

      - name: Push release commit and channel tag
        run: |
          git push origin HEAD
          git push origin "$TAG_NAME"
