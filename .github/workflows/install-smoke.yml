name: Install Smoke Test

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Install source"
        required: true
        type: choice
        options:
          - github
          - testpypi
        default: github
      git_ref:
        description: "Git ref for github source (branch, tag, or sha)"
        required: false
        type: string
        default: main
      version:
        description: "Package version for testpypi source"
        required: false
        type: string

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install from GitHub
        if: ${{ github.event.inputs.source == 'github' }}
        env:
          REF: ${{ github.event.inputs.git_ref }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install "gaussian-rational @ git+https://github.com/${{ github.repository }}.git@$REF"

      - name: Install from TestPyPI
        if: ${{ github.event.inputs.source == 'testpypi' }}
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ -z "$VERSION" ]]; then
            echo "version input is required for testpypi source"
            exit 1
          fi
          python -m pip install --upgrade pip
          python -m pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            "gaussian-rational==$VERSION"

      - name: Smoke test import and arithmetic
        run: |
          python - <<'PY'
          from fractions import Fraction
          from gaussian_rational import GaussianRational, __version__

          z = GaussianRational(Fraction(1, 2), Fraction(1, 3))
          w = GaussianRational(2, -1)
          result = z * w

          print("gaussian-rational version:", __version__)
          print("result:", result)
          assert result == GaussianRational(Fraction(4, 3), Fraction(1, 6))
          PY
