name: Publish TestPyPI
run-name: "Publish TestPyPI · ${{ github.ref_name }}"

# Triggered by any push to the rc branch (done by cut-rc).
# Validates that pyproject.toml carries an X.Y.Z-rc.N version, runs quality
# checks, publishes to TestPyPI via OIDC trusted publishing, then tags the
# commit v<x.y.z>-rc.<n>.

on:
  push:
    branches:
      - "rc"

jobs:
  test:
    name: "Test · Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: true

      - name: Install dependencies
        run: pdm install -G dev

      - name: Lint
        run: pdm run lint

      - name: Type check
        run: pdm run typecheck

      - name: Test
        run: pdm run test

  publish:
    name: Publish
    needs: test
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write  # Required for OIDC trusted publishing.
      contents: write  # Required to push the v<x.y.z>-rc.<n> tag after publish.

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.12"
          cache: true

      - name: Install dependencies
        run: pdm install -G dev

      - name: Validate version
        run: |
          VERSION=$(python -c "
          import tomllib
          print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])
          ")
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
            echo "::error::TestPyPI publish requires X.Y.Z-rc.N version, got: $VERSION"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Check not already on TestPyPI
        run: |
          PACKAGE=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['name'])")
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://test.pypi.org/pypi/${PACKAGE}/${VERSION}/json")
          if [[ "$HTTP" == "200" ]]; then
            echo "::error::Version ${VERSION} is already on TestPyPI"
            exit 1
          fi

      - name: Build
        run: pdm build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Tag published commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
