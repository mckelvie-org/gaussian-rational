name: Publish TestPyPI

on:
  push:
    tags:
      - "rc-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate tag and version
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG_NAME#rc-v}"
          PROJECT_VERSION=$(python - <<'PY'
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
          print(data['project']['version'])
          PY
          )

          if [[ "$TAG_VERSION" != "$PROJECT_VERSION" ]]; then
            echo "Tag version ($TAG_VERSION) does not match pyproject version ($PROJECT_VERSION)."
            exit 1
          fi

          if [[ ! "$TAG_VERSION" =~ [.-]rc[0-9]+$ ]]; then
            echo "TestPyPI publish requires an rc version suffix, got: $TAG_VERSION"
            exit 1
          fi

      - name: Ensure version is not already on TestPyPI
        run: |
          VERSION=$(python - <<'PY'
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
          print(data['project']['version'])
          PY
          )

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://test.pypi.org/pypi/gaussian-rational/${VERSION}/json")

          if [[ "$STATUS" == "200" ]]; then
            echo "Version $VERSION already exists on TestPyPI. Bump version before publishing."
            exit 1
          fi

      - name: Install PDM
        run: |
          python -m pip install --upgrade pip
          pip install pdm

      - name: Build package
        run: pdm build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
