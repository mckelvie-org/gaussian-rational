name: Publish TestPyPI

# Triggered by rc-v<x.y.z>-rc.<n> tags pushed by the cut-rc action in
# release.yml.

on:
  push:
    tags:
      - "rc-v*"

permissions:
  contents: read
  id-token: write  # Required for OIDC trusted publishing.

jobs:
  publish-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.12"
          cache: true

      - name: Install dependencies
        run: pdm install -G dev

      - name: Validate tag and version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#rc-v}"
          PROJECT_VERSION=$(python -c "
          import tomllib
          print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])
          ")
          if [[ "$TAG_VERSION" != "$PROJECT_VERSION" ]]; then
            echo "::error::Tag version ($TAG_VERSION) != pyproject version ($PROJECT_VERSION)"
            exit 1
          fi
          if [[ ! "$TAG_VERSION" =~ -rc\.[0-9]+$ ]]; then
            echo "::error::TestPyPI publish requires X.Y.Z-rc.N version, got: $TAG_VERSION"
            exit 1
          fi

      - name: Check not already on TestPyPI
        run: |
          VERSION="${GITHUB_REF_NAME#rc-v}"
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://test.pypi.org/pypi/gaussian-rational/$VERSION/json")
          if [[ "$HTTP" == "200" ]]; then
            echo "::error::Version $VERSION is already on TestPyPI"
            exit 1
          fi

      - name: Run checks
        run: |
          pdm run lint
          pdm run typecheck
          pdm run test

      - name: Build
        run: pdm build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
