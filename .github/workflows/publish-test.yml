name: Publish TestPyPI

# Triggered by any push to an rc/<x.y.z> branch (done by cut-rc in release.yml).
# Validates that pyproject.toml carries an X.Y.Z-rc.N version matching the
# branch, runs quality checks, publishes to TestPyPI via OIDC trusted
# publishing, then tags the commit rc-v<x.y.z>-rc.<n>.

on:
  push:
    branches:
      - "rc/**"

permissions:
  id-token: write  # Required for OIDC trusted publishing.
  contents: write  # Required to push the rc-v<x.y.z>-rc.<n> tag after publish.

jobs:
  publish-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.12"
          cache: true

      - name: Install dependencies
        run: pdm install -G dev

      - name: Validate branch and version
        run: |
          BRANCH_XYZ="${GITHUB_REF_NAME#rc/}"
          VERSION=$(python -c "
          import tomllib
          print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])
          ")
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
            echo "::error::TestPyPI publish requires X.Y.Z-rc.N version, got: $VERSION"
            exit 1
          fi
          VERSION_XYZ="${VERSION%-rc.*}"
          if [[ "$VERSION_XYZ" != "$BRANCH_XYZ" ]]; then
            echo "::error::Branch rc/${BRANCH_XYZ} version mismatch: pyproject has ${VERSION}"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Check not already on TestPyPI
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://test.pypi.org/pypi/gaussian-rational/${VERSION}/json")
          if [[ "$HTTP" == "200" ]]; then
            echo "::error::Version ${VERSION} is already on TestPyPI"
            exit 1
          fi

      - name: Run checks
        run: |
          pdm run lint
          pdm run typecheck
          pdm run test

      - name: Build
        run: pdm build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Tag published commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "rc-v${VERSION}"
          git push origin "rc-v${VERSION}"
